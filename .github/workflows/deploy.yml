name: deploy

# Runs only after the `test` workflow on `main` succeeds. Pushes a fresh
# Railway build using the CLI. Requires three GitHub repository secrets:
#
#   RAILWAY_TOKEN   — `railway login` → `railway tokens new` (or
#                     Railway dashboard → Account Settings → Tokens).
#   RAILWAY_PROJECT — the Railway project id (printable via
#                     `railway status --json | jq .projectId`).
#   RAILWAY_SERVICE — the Railway service id within that project (same
#                     command, `.serviceId`).
#
# If RAILWAY_TOKEN isn't set, the job exits cleanly with a "skipped"
# message — pushing to main doesn't fail just because deploy isn't
# wired yet.

on:
  workflow_run:
    workflows: [test]
    types: [completed]
    branches: [main]

jobs:
  railway:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for Railway token
        id: check
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "::notice::RAILWAY_TOKEN secret not set — skipping deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Railway CLI
        if: steps.check.outputs.skip != 'true'
        run: npm install -g @railway/cli

      - name: Deploy
        if: steps.check.outputs.skip != 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service "${{ secrets.RAILWAY_SERVICE }}" \
                     --project "${{ secrets.RAILWAY_PROJECT }}" \
                     --ci
