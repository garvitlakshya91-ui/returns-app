name = "ReturnFlow"
handle = "returnflow"
client_id = "56cf3e9878ee2a52551ea0921b4c6c67"
application_url = "https://returnflow.co.uk"
embedded = true

[access_scopes]
scopes = "read_orders,write_orders,read_products,write_gift_cards,read_customers,read_shipping"

[auth]
redirect_urls = [
  "https://returnflow.co.uk/auth/callback",
]

[webhooks]
api_version = "2025-04"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "https://returnflow.co.uk/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = ["orders/fulfilled"]
  uri = "https://returnflow.co.uk/webhooks/orders/fulfilled"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "https://returnflow.co.uk/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["shop/update"]
  uri = "https://returnflow.co.uk/webhooks/shop/update"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "https://returnflow.co.uk/webhooks"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

# Tells the Shopify CLI how to start the dev server. The backend serves both
# the embedded merchant SPA (/admin) and the customer portal (/portal) once
# you've run `npm run build`. For pure-backend dev you can skip the build —
# only the API routes need to be reachable for OAuth + webhooks to work.
[[web]]
roles = ["backend", "frontend"]
command = "npm run dev"
port = 3003
