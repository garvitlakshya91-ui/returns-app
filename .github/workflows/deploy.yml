name: deploy

# Runs after the `test` workflow on `main` succeeds and deploys to Railway via
# the CLI. Requires ONE GitHub repository secret:
#
#   RAILWAY_TOKEN — a Railway *project* token scoped to the production
#                   environment (Railway → project → Settings → Tokens).
#                   A project token implies the project + environment, so no
#                   project/service ids are needed. With a single service in
#                   the project, `railway up` deploys it unambiguously.
#
# If RAILWAY_TOKEN isn't set, the job exits cleanly with a "skipped" notice —
# pushing to main doesn't fail just because deploy isn't wired yet.

on:
  workflow_run:
    workflows: [test]
    types: [completed]
    branches: [main]

jobs:
  railway:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for Railway token
        id: check
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "::notice::RAILWAY_TOKEN secret not set — skipping deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Railway CLI
        if: steps.check.outputs.skip != 'true'
        run: npm install -g @railway/cli

      - name: Deploy
        if: steps.check.outputs.skip != 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        # The project has more than one service, so name the target explicitly.
        run: railway up --ci --service web
